# Dark Pastel theme for tmux
# Matches base16-dark-pastel Emacs theme

# Palette reference (from Ghostty "Dark Pastel"):
# base00: #000000  bg           base04: #d4d4d4  dark fg
# base01: #1a1a1a  modeline     base05: #ffffff  fg
# base02: #555555  bright black base0D: #5555ff  blue
# base03: #aaaaaa  comments     base0C: #55ffff  cyan
# base08: #ff5555  red          base0B: #55ff55  green

# Status bar
set -g status-bg "#1a1a1a"
set -g status-fg "#aaaaaa"
set -g status-style "bg=#1a1a1a,fg=#aaaaaa"

# Status left/right
set -g status-left " #S "
set -g status-left-style "bg=#000000,fg=#aaaaaa"
set -g status-right " #h "
set -g status-right-style "bg=#000000,fg=#aaaaaa"

# Window status
set -g window-status-format " #I #W "
set -g window-status-style "fg=#aaaaaa,bg=#1a1a1a"

# Active window
set -g window-status-current-format " #I #W "
set -g window-status-current-style "fg=#ffffff,bg=#1a1a1a,bold"

# Pane borders
set -g pane-border-style "fg=#555555"
set -g pane-active-border-style "fg=#55ffff,bold"
set -g window-style 'fg=#808080'
set -g window-active-style 'fg=#ffffff'

# Messages
set -g message-style "bg=#1a1a1a,fg=#ff5555"

# Pane number display
set -g display-panes-active-colour "#5555ff"
set -g display-panes-colour "#ff5555"

# Clock
set -g clock-mode-colour "#55ff55"
