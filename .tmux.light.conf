# Selenized Light theme for tmux
# Matches base16-selenized-light Emacs theme

# Palette reference (from Ghostty "Selenized Light"):
# base00: #fbf3db  bg           base04: #627377  dark fg
# base01: #ece3cc  selection    base05: #53676d  fg
# base02: #909995  bright black base0D: #0072d4  blue
# base03: #718081  comments     base0C: #009c8f  cyan
# base08: #d2212d  red          base0B: #489100  green

# Status bar
set -g status-bg "#ece3cc"
set -g status-fg "#53676d"
set -g status-style "bg=#ece3cc,fg=#53676d"

# Status left/right
set -g status-left " #S "
set -g status-left-style "bg=#fbf3db,fg=#627377"
set -g status-right " #h "
set -g status-right-style "bg=#fbf3db,fg=#627377"

# Window status
set -g window-status-format " #I #W "
set -g window-status-style "fg=#627377,bg=#ece3cc"

# Active window
set -g window-status-current-format " #I #W "
set -g window-status-current-style "fg=#fbf3db,bg=#009c8f"

# Pane borders
set -g pane-border-style "fg=#909995"
set -g pane-active-border-style "fg=#009c8f,bold"
set -g window-style 'fg=#909995'
set -g window-active-style 'fg=#53676d'

# Messages
set -g message-style "bg=#ece3cc,fg=#cc1729"

# Pane number display
set -g display-panes-active-colour "#0072d4"
set -g display-panes-colour "#cc1729"

# Clock
set -g clock-mode-colour "#489100"
