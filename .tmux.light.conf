# Solarized Light theme for tmux
# Based on official solarized by Ethan Schoonover

# Official Solarized palette:
# base03:  #002b36  base02:  #073642
# base01:  #586e75  base00:  #657b83
# base0:   #839496  base1:   #93a1a1
# base2:   #eee8d5  base3:   #fdf6e3
# yellow:  #b58900  orange:  #cb4b16
# red:     #dc322f  magenta: #d33682
# violet:  #6c71c4  blue:    #268bd2
# cyan:    #2aa198  green:   #859900

# Status bar
set -g status-bg "#eee8d5"
set -g status-fg "#b58900"
set -g status-style "bg=#eee8d5,fg=#b58900"

# Status left/right
set -g status-left " #S "
set -g status-left-style "bg=#fdf6e3,fg=#657b83"
set -g status-right " #h "
set -g status-right-style "bg=#fdf6e3,fg=#657b83"

# Window status
set -g window-status-format " #I #W "
set -g window-status-style "fg=#657b83,bg=#eee8d5"

# Active window
set -g window-status-current-format " #I #W "
set -g window-status-current-style "fg=#fdf6e3,bg=#2aa198"

# Pane borders
set -g pane-border-style "fg=#eee8d5"
set -g pane-active-border-style "fg=#93a1a1"

# Messages
set -g message-style "bg=#eee8d5,fg=#cb4b16"

# Pane number display
set -g display-panes-active-colour "#268bd2"
set -g display-panes-colour "#cb4b16"

# Clock
set -g clock-mode-colour "#859900"
